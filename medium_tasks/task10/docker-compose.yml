services:
  go_service:
    build: ./go_service
    ports:
      - "${GO_PORT:-8080}:${GO_PORT:-8080}"
    env_file:
      - .env
    environment:
      - GO_PORT=${GO_PORT:-8080}
      - APP_ENV=${APP_ENV:-development}
      - APP_VERSION=${APP_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GO_PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  python_service:
    build: ./python_service
    ports:
      - "${PYTHON_PORT:-8000}:${PYTHON_PORT:-8000}"
    env_file:
      - .env
    environment:
      - PYTHON_PORT=${PYTHON_PORT:-8000}
      - APP_ENV=${APP_ENV:-development}
      - APP_VERSION=${APP_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:${PYTHON_PORT:-8000}/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      go_service:
        condition: service_healthy